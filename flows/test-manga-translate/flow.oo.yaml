title: "%test-manga-translation%"
description: "%simple-test-flow-to-verify-manga-translation-functionality%"
icon: ":carbon:image:"

nodes:

  - task: self::translate-manga-page
    title: "%translate-manga-page%"
    node_id: translate-manga-page#1
    inputs_from:
      - handle: input
        value: /oomol-driver/oomol-storage/pdf/4_媊晝偵書偐傟傞嵢_桼堖曇_憤廤曇偍傑偗.pdf
        from_node:
          []
      - handle: source_language
        value: auto
      - handle: target_language
        value: CHS
      - handle: device
        value: cpu
      - handle: llm
        value:
          model: oomol-chat
          temperature: 0.5
          top_p: 1
          max_tokens: 128000

  - task: oomol-preview::image_preview
    title: "%preview-result%"
    node_id: image_preview#1
    inputs_from:
      - handle: image_path
        from_node:
          []
  - node_id: translate-manga-book#1
    title: "翻译漫画书 #1"
    inputs_from:
      - handle: book_path
        value: /oomol-driver/oomol-storage/new_book/漫画.zip
      - handle: translated_path
        value: null
      - handle: target_language
        value: CHS
      - handle: source_language
        value: auto
      - handle: device
        value: cuda
      - handle: llm
        value:
          model: deepseek-chat
          temperature: 0.6
          top_p: 0.8
          max_tokens: 8100
    subflow: self::translate-manga-book
